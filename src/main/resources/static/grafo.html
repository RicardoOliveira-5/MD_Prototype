<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Graph — Visualizador</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap');

        :root {
            --bg:      #0a0e1a;
            --surface: #111827;
            --border:  #1e2d45;
            --accent:  #00e5ff;
            --green:   #00ff88;
            --orange:  #ff8c00;
            --red:     #ff3b5c;
            --text:    #e2e8f0;
            --muted:   #4a6080;

            /* cores por tipo de nó */
            --paragem: #00e5ff;
            --zona:    #a78bfa;
            --rota:    #34d399;
            --evento:  #fb923c;
            --veiculo: #f472b6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            gap: 1rem;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent);
            white-space: nowrap;
        }

        .tabs {
            display: flex;
            gap: 0.4rem;
        }

        .tab {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            padding: 0.35rem 0.9rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all .2s;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .tab.active, .tab:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0,229,255,.08);
        }

        .nav-link {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            text-decoration: none;
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            transition: all .2s;
        }

        .nav-link:hover { color: var(--text); border-color: var(--muted); }

        /* ── MAIN LAYOUT ── */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-section {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 0.8rem;
        }

        /* Legenda */
        .legend { display: flex; flex-direction: column; gap: 0.4rem; }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
            transition: background .15s;
        }

        .legend-item:hover { background: rgba(255,255,255,.04); }

        .legend-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-count {
            margin-left: auto;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
        }

        /* Filtros de relação */
        .filter-list { display: flex; flex-direction: column; gap: 0.3rem; }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--muted);
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }

        .filter-item:hover { background: rgba(255,255,255,.04); color: var(--text); }

        .filter-item input { accent-color: var(--accent); }

        /* Painel pathfinding */
        .path-form { display: flex; flex-direction: column; gap: 0.6rem; }

        select, .btn {
            width: 100%;
            padding: 0.5rem 0.7rem;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
        }

        .btn {
            background: rgba(0,229,255,.1);
            border-color: var(--accent);
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            transition: background .2s;
        }

        .btn:hover { background: rgba(0,229,255,.2); }

        .btn-danger {
            background: rgba(255,59,92,.1);
            border-color: var(--red);
            color: var(--red);
        }

        .path-result {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--green);
            line-height: 1.5;
            word-break: break-word;
        }

        /* Painel nó selecionado */
        .node-panel {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.2rem;
        }

        .prop-row {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255,255,255,.04);
            font-size: 0.75rem;
            gap: 0.5rem;
        }

        .prop-key { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.68rem; }
        .prop-val { color: var(--text); text-align: right; word-break: break-all; }

        /* ── CANVAS ── */
        #graph-canvas {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #vis-network { width: 100%; height: 100%; }

        /* Meta-grafo overlay */
        #meta-view {
            display: none;
            width: 100%;
            height: 100%;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            transform: translateY(100px);
            transition: transform .3s;
            z-index: 999;
        }

        .toast.show { transform: translateY(0); }

        /* Controls */
        .canvas-controls {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.4rem;
        }

        .ctrl-btn {
            width: 32px; height: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
        }

        .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
            z-index: 10;
        }

        /* Rota manager */
        .rota-list-mini { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.5rem; }

        .rota-mini-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: border-color .2s;
        }

        .rota-mini-row.selected { border-color: var(--accent); background: rgba(0,229,255,.06); }
        .rota-mini-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>

<header>
    <div class="logo">TRANSPORT<span style="color:var(--muted)">/</span>GRAFO</div>
    <div class="tabs">
        <button class="tab active" onclick="setView('grafo')">Grafo</button>
        <button class="tab" onclick="setView('meta')">Meta-Grafo</button>
        <button class="tab" onclick="setView('rotas')">Rotas</button>
    </div>
    <a href="/dashboard.html" class="nav-link">← Dashboard</a>
</header>

<div class="workspace">

    <!-- ── SIDEBAR ── -->
    <div class="sidebar">

        <!-- Legenda -->
        <div class="sidebar-section" id="panel-legenda">
            <div class="sidebar-title">Tipos de Nó</div>
            <div class="legend">
                <div class="legend-item" onclick="filterByLabel('Paragem')">
                    <div class="legend-dot" style="background:var(--paragem)"></div>
                    <span>Paragem</span>
                    <span class="legend-count" id="cnt-Paragem">—</span>
                </div>
                <div class="legend-item" onclick="filterByLabel('Zona')">
                    <div class="legend-dot" style="background:var(--zona)"></div>
                    <span>Zona</span>
                    <span class="legend-count" id="cnt-Zona">—</span>
                </div>
                <div class="legend-item" onclick="filterByLabel('Rota')">
                    <div class="legend-dot" style="background:var(--rota)"></div>
                    <span>Rota</span>
                    <span class="legend-count" id="cnt-Rota">—</span>
                </div>
                <div class="legend-item" onclick="filterByLabel('Evento')">
                    <div class="legend-dot" style="background:var(--evento)"></div>
                    <span>Evento</span>
                    <span class="legend-count" id="cnt-Evento">—</span>
                </div>
                <div class="legend-item" onclick="filterByLabel('Veiculo')">
                    <div class="legend-dot" style="background:var(--veiculo)"></div>
                    <span>Veículo</span>
                    <span class="legend-count" id="cnt-Veiculo">—</span>
                </div>
                <div class="legend-item" onclick="resetFilter()" style="margin-top:0.3rem">
                    <div class="legend-dot" style="background:var(--muted)"></div>
                    <span style="color:var(--muted)">Mostrar tudo</span>
                </div>
            </div>
        </div>

        <!-- Filtro relações -->
        <div class="sidebar-section" id="panel-filtros">
            <div class="sidebar-title">Relações</div>
            <div class="filter-list" id="rel-filters"></div>
        </div>

        <!-- Pathfinding -->
        <div class="sidebar-section" id="panel-path">
            <div class="sidebar-title">Pathfinding (T04)</div>
            <div class="path-form">
                <select id="path-origem"><option value="">Origem...</option></select>
                <select id="path-destino"><option value="">Destino...</option></select>
                <button class="btn" onclick="findPath()">▶ Calcular Caminho</button>
                <button class="btn btn-danger" onclick="clearPath()">✕ Limpar</button>
                <div class="path-result" id="path-result"></div>
            </div>
        </div>

        <!-- Nó selecionado -->
        <div class="node-panel" id="panel-no">
            <div class="sidebar-title">Nó Selecionado</div>
            <div id="node-props" style="color:var(--muted);font-size:0.75rem;font-family:'Space Mono',monospace">
                // Clica num nó para ver as suas propriedades
            </div>
        </div>

        <!-- Gestão de rotas (oculto por defeito) -->
        <div class="sidebar-section" id="panel-rotas" style="display:none">
            <div class="sidebar-title">Gerir Rotas</div>
            <div id="rota-list-mini" class="rota-list-mini"></div>
            <div style="margin-top:0.8rem">
                <div class="sidebar-title">Adicionar Paragem</div>
                <select id="rota-add-parag" style="margin-bottom:0.5rem"><option value="">Paragem...</option></select>
                <button class="btn" onclick="adicionarParagem()">+ Adicionar à Rota</button>
            </div>
        </div>

    </div>

    <!-- ── CANVAS ── -->
    <div id="graph-canvas">
        <div class="loading-overlay" id="loading">A carregar grafo...</div>
        <div id="vis-network"></div>
        <div id="meta-view"></div>
        <div class="canvas-controls">
            <div class="ctrl-btn" onclick="network.fit()" title="Encaixar">⊡</div>
            <div class="ctrl-btn" onclick="network.zoomIn()" title="Zoom +">+</div>
            <div class="ctrl-btn" onclick="network.zoomOut()" title="Zoom −">−</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API = 'http://localhost:8080/api';
    const COLORS = {
        Paragem: { bg: '#00e5ff22', border: '#00e5ff', font: '#e2e8f0' },
        Zona:    { bg: '#a78bfa22', border: '#a78bfa', font: '#e2e8f0' },
        Rota:    { bg: '#34d39922', border: '#34d399', font: '#e2e8f0' },
        Evento:  { bg: '#fb923c22', border: '#fb923c', font: '#e2e8f0' },
        Veiculo: { bg: '#f472b622', border: '#f472b6', font: '#e2e8f0' },
    };
    const REL_COLORS = {
        SERVE:               '#00e5ff',
        PERTENCE_A:          '#a78bfa',
        INCLUI:              '#34d399',
        OCORRE_EM:           '#fb923c',
        AFETA_ZONA:          '#f472b6',
        ALOCADO_A:           '#94a3b8',
        LIGACAO_TEMPORARIA:  '#ffdd00',
    };

    let network, allNodes, allEdges, grafoData, rotasSelecionada = null;
    let visNodes, visEdges;

    // ── INIT ─────────────────────────────────────────────────
    async function init() {
        grafoData = await fetch(`${API}/grafo`).then(r => r.json());

        // Contagens
        const counts = {};
        grafoData.nos.forEach(n => counts[n.label] = (counts[n.label] || 0) + 1);
        Object.entries(counts).forEach(([l, c]) => {
            const el = document.getElementById(`cnt-${l}`);
            if (el) el.textContent = c;
        });

        // Filtros de relações
        const tiposRel = [...new Set(grafoData.relacoes.map(r => r.tipo))];
        document.getElementById('rel-filters').innerHTML = tiposRel.map(t => `
      <label class="filter-item">
        <input type="checkbox" checked onchange="toggleRelType('${t}', this.checked)">
        <span style="color:${REL_COLORS[t] || '#94a3b8'};font-family:'Space Mono',monospace;font-size:0.68rem">${t}</span>
      </label>
    `).join('');

        // Selects de pathfinding
        const paragens = grafoData.nos.filter(n => n.label === 'Paragem');
        const opts = paragens.map(p => `<option value="${p.propriedades.id}">${p.nome}</option>`).join('');
        document.getElementById('path-origem').innerHTML  = '<option value="">Origem...</option>' + opts;
        document.getElementById('path-destino').innerHTML = '<option value="">Destino...</option>' + opts;
        document.getElementById('rota-add-parag').innerHTML = '<option value="">Paragem...</option>' + opts;

        buildVisGraph(grafoData.nos, grafoData.relacoes);
        document.getElementById('loading').style.display = 'none';
    }

    // ── BUILD VIS GRAPH ──────────────────────────────────────
    function buildVisGraph(nos, relacoes) {
        allNodes = nos.map(n => ({
            id:    n.id,
            label: n.nome,
            group: n.label,
            title: buildTooltip(n),
            color: {
                background: COLORS[n.label]?.bg || '#1e2d45',
                border:     COLORS[n.label]?.border || '#4a6080',
                highlight:  { background: COLORS[n.label]?.border || '#4a6080', border: '#fff' }
            },
            font:  { color: '#e2e8f0', size: 11 },
            shape: n.label === 'Paragem' ? 'dot' :
                n.label === 'Zona'    ? 'diamond' :
                    n.label === 'Rota'    ? 'square' :
                        n.label === 'Evento'  ? 'star' : 'triangle',
            size:  n.label === 'Paragem' ? 18 : 14,
            _data: n
        }));

        allEdges = relacoes.map(r => ({
            id:     r.id,
            from:   r.origem,
            to:     r.destino,
            label:  r.tipo,
            _tipo:  r.tipo,
            arrows: 'to',
            color:  { color: REL_COLORS[r.tipo] || '#4a6080', opacity: 0.6 },
            font:   { color: '#4a6080', size: 9, align: 'middle' },
            width:  r.tipo === 'SERVE' ? 2 : 1,
            dashes: r.tipo === 'LIGACAO_TEMPORARIA',
        }));

        visNodes = new vis.DataSet(allNodes);
        visEdges = new vis.DataSet(allEdges);

        const container = document.getElementById('vis-network');
        network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, {
            physics: {
                enabled: true,
                barnesHut: { gravitationalConstant: -8000, springLength: 120, damping: 0.4 }
            },
            interaction: { hover: true, tooltipDelay: 200 },
            layout: { improvedLayout: true }
        });

        network.on('click', params => {
            if (params.nodes.length > 0) {
                const node = allNodes.find(n => n.id === params.nodes[0]);
                if (node) showNodeProps(node._data);
            }
        });
    }

    function buildTooltip(n) {
        const lines = Object.entries(n.propriedades)
            .filter(([k]) => !['afluencia_atual','lat','lon'].includes(k))
            .map(([k,v]) => `<b>${k}</b>: ${v}`)
            .join('<br>');
        return `<div style="background:#111827;padding:8px;border-radius:6px;font-family:monospace;font-size:11px;color:#e2e8f0;max-width:200px"><b style="color:#00e5ff">${n.label}</b><br>${lines}</div>`;
    }

    // ── SHOW NODE PROPS ──────────────────────────────────────
    function showNodeProps(n) {
        const color = COLORS[n.label]?.border || '#94a3b8';
        const props = Object.entries(n.propriedades).map(([k,v]) => `
      <div class="prop-row">
        <span class="prop-key">${k}</span>
        <span class="prop-val">${v ?? '—'}</span>
      </div>`).join('');

        document.getElementById('node-props').innerHTML = `
      <div style="margin-bottom:0.8rem">
        <span style="color:${color};font-family:'Space Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:.1em">${n.label}</span>
        <div style="font-weight:600;margin-top:0.2rem">${n.nome}</div>
      </div>
      ${props}
    `;
    }

    // ── FILTER ───────────────────────────────────────────────
    function filterByLabel(label) {
        const filtered = allNodes.filter(n => n.group === label);
        const ids = new Set(filtered.map(n => n.id));
        visNodes.update(allNodes.map(n => ({ id: n.id, hidden: !ids.has(n.id) })));
        visEdges.update(allEdges.map(e => ({ id: e.id, hidden: !ids.has(e.from) || !ids.has(e.to) })));
    }

    function resetFilter() {
        visNodes.update(allNodes.map(n => ({ id: n.id, hidden: false })));
        visEdges.update(allEdges.map(e => ({ id: e.id, hidden: false })));
    }

    function toggleRelType(tipo, show) {
        visEdges.update(allEdges.filter(e => e._tipo === tipo).map(e => ({ id: e.id, hidden: !show })));
    }

    // ── PATHFINDING ──────────────────────────────────────────
    async function findPath() {
        const origem  = document.getElementById('path-origem').value;
        const destino = document.getElementById('path-destino').value;
        if (!origem || !destino) return showToast('Seleciona origem e destino');

        try {
            const data = await fetch(`${API}/grafo/caminho?origem=${origem}&destino=${destino}`).then(r => r.json());

            document.getElementById('path-result').innerHTML =
                `→ ${data.paragens.join(' → ')}<br><br>` +
                `Saltos: ${data.saltos} | Tempo: ${data.tempoTotalMin} min`;

            // Destacar nós e relações do caminho
            const nosPath  = new Set(data.nos);
            const relsPath = new Set(data.relacoes);

            visNodes.update(allNodes.map(n => ({
                id: n.id,
                opacity: nosPath.has(n.id) ? 1 : 0.2,
                size: nosPath.has(n.id) ? 24 : (n.label === 'Paragem' ? 18 : 14)
            })));

            visEdges.update(allEdges.map(e => ({
                id: e.id,
                color: relsPath.has(e.id)
                    ? { color: '#00ff88', opacity: 1 }
                    : { color: '#1e2d45', opacity: 0.15 },
                width: relsPath.has(e.id) ? 4 : 1
            })));

        } catch (e) {
            document.getElementById('path-result').innerHTML = '// Sem caminho encontrado';
        }
    }

    function clearPath() {
        document.getElementById('path-result').innerHTML = '';
        visNodes.update(allNodes.map(n => ({ id: n.id, opacity: 1, size: n.label === 'Paragem' ? 18 : 14 })));
        visEdges.update(allEdges.map(e => ({
            id: e.id,
            color: { color: REL_COLORS[e._tipo] || '#4a6080', opacity: 0.6 },
            width: e._tipo === 'SERVE' ? 2 : 1
        })));
    }

    // ── META-GRAFO ────────────────────────────────────────────
    async function showMetaGrafo() {
        const meta = await fetch(`${API}/grafo/meta`).then(r => r.json());

        const metaNos = meta.nos.map(n => ({
            id: n.label, label: `${n.label}\n(${n.count})`,
            color: { background: COLORS[n.label]?.bg || '#1e2d4522', border: COLORS[n.label]?.border || '#4a6080' },
            font: { color: '#e2e8f0', size: 13, bold: true },
            size: 30, shape: 'ellipse'
        }));

        const metaEdges = meta.relacoes.map((r, i) => ({
            id: i, from: r.origem, to: r.destino,
            label: `${r.tipo}\n(${r.count})`,
            arrows: 'to',
            color: { color: REL_COLORS[r.tipo] || '#4a6080' },
            font: { color: '#94a3b8', size: 9 }
        }));

        const vN = new vis.DataSet(metaNos);
        const vE = new vis.DataSet(metaEdges);
        const container = document.getElementById('vis-network');
        network = new vis.Network(container, { nodes: vN, edges: vE }, {
            physics: { barnesHut: { springLength: 200 } },
            layout: { improvedLayout: true }
        });
    }

    // ── GESTÃO DE ROTAS ───────────────────────────────────────
    async function showRotasPanel() {
        const rotas = grafoData.nos.filter(n => n.label === 'Rota');
        document.getElementById('rota-list-mini').innerHTML = rotas.map(r => `
      <div class="rota-mini-row" id="rmini-${r.propriedades.id}" onclick="selecionarRota('${r.propriedades.id}', '${r.nome}')">
        <div class="rota-mini-dot" style="background:var(--rota)"></div>
        <span>${r.nome}</span>
        <span style="font-size:0.65rem;color:var(--muted);margin-left:auto">${r.propriedades.tipo}</span>
      </div>`).join('');
    }

    function selecionarRota(id, nome) {
        rotasSelecionada = id;
        document.querySelectorAll('.rota-mini-row').forEach(el => el.classList.remove('selected'));
        document.getElementById(`rmini-${id}`)?.classList.add('selected');

        // Destacar a rota no grafo
        const rotaNo = allNodes.find(n => n.group === 'Rota' && n._data.propriedades.id === id);
        if (rotaNo) {
            network.selectNodes([rotaNo.id]);
            network.focus(rotaNo.id, { scale: 1.2, animation: true });
        }
        showToast(`Rota selecionada: ${nome}`);
    }

    async function adicionarParagem() {
        if (!rotasSelecionada) return showToast('Seleciona uma rota primeiro');
        const paragId = document.getElementById('rota-add-parag').value;
        if (!paragId) return showToast('Seleciona uma paragem');

        await fetch(`${API}/grafo/rotas/${rotasSelecionada}/paragens/${paragId}`, { method: 'POST' });
        showToast('Paragem adicionada! A recarregar...');
        setTimeout(() => { grafoData = null; init(); }, 1000);
    }

    // ── VIEWS ─────────────────────────────────────────────────
    function setView(view) {
        document.querySelectorAll('.tab').forEach((t,i) => {
            t.classList.toggle('active', ['grafo','meta','rotas'][i] === view);
        });

        document.getElementById('panel-rotas').style.display = view === 'rotas' ? 'block' : 'none';
        document.getElementById('panel-path').style.display  = view === 'grafo' ? 'block' : 'none';

        if (view === 'meta') {
            showMetaGrafo();
        } else if (view === 'rotas') {
            showRotasPanel();
            if (grafoData) buildVisGraph(grafoData.nos, grafoData.relacoes);
        } else {
            if (grafoData) buildVisGraph(grafoData.nos, grafoData.relacoes);
        }
    }

    // ── TOAST ─────────────────────────────────────────────────
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    init();
</script>
</body>
</html>
